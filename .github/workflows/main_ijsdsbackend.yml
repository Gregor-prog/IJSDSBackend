name: Build and deploy Node.js app to Azure Web App - ijsdsBackend

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: '22.x'

      - name: npm install, build, and test
        env:
          DATABASE_URL: "postgres://dummy:dummy@localhost:5432/dummy"
        run: |
          npm install
          npx prisma generate --schema=prisma/schema.prisma
          npm run test --if-present

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: .
          include-hidden-files: true   # 👈 add this

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_142F5D888A3B4FF3A795EE2DCFB939AA }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_CDB2D0635A424B49BA8036D108C80B6A }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_B932FB287A3B4697B95B54F2FF380D6E }}

      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'ijsdsBackend'
          slot-name: 'Production'
          package: .
```

---

## Also check your `.gitignore`

Make sure it does **not** contain either of these:
```
node_modules/.prisma
.prisma